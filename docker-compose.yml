services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "127.0.0.1:18888:18888"
    environment:
      - LISTEN=0.0.0.0:18888
      - DATABASE=sqlite3:///data/data.db
      - FRONTEND_DIR=/app/public
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - PUBLIC_URL=${PUBLIC_URL:-}
      - EPAY_GATEWAY=${EPAY_GATEWAY:-}
      - EPAY_PID=${EPAY_PID:-}
      - EPAY_KEY=${EPAY_KEY:-}
      - EPAY_TYPE=${EPAY_TYPE:-alipay}
      - CODEPAY_CREATE_URL=${CODEPAY_CREATE_URL:-}
      - CODEPAY_MERCHANT_ID=${CODEPAY_MERCHANT_ID:-}
      - CODEPAY_KEY=${CODEPAY_KEY:-}
    volumes:
      - panel-data:/data
    networks:
      - panel-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - panel-net

volumes:
  panel-data:

networks:
  panel-net:
